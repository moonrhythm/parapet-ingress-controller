name: edge-e2e

# Cluster-free cross-language smoke test: real Go control plane (fs backend) +
# real Rust edge + dummy upstream, wired by deploy/edge/e2e/run.sh. Proves the
# edge fetches a cert+key from the control plane (bearer-authorized), terminates
# TLS locally with it, and forwards to the upstream. See EDGE.md.
on:
  push:
    paths:
      - 'go/**'
      - 'rust/**'
      - 'deploy/edge/e2e/**'
      - '.github/workflows/edge-e2e.yaml'
  pull_request:
    paths:
      - 'go/**'
      - 'rust/**'
      - 'deploy/edge/e2e/**'
      - '.github/workflows/edge-e2e.yaml'

jobs:
  e2e:
    name: edge ↔ control-plane e2e
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.3'
      - name: Install native build deps (pingora openssl backend)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends cmake clang pkg-config libssl-dev netcat-openbsd
      - run: rm -f rust/.cargo/config.toml # macOS-only OPENSSL_DIR override
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.95.0
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      - run: bash deploy/edge/e2e/run.sh
