name: edge-e2e

# Cluster-free smoke test: real Go control plane (fs backend) + real Go edge +
# dummy upstream, wired by deploy/edge/e2e/run.sh. Proves the edge fetches a
# cert+key + WAF rules from the control plane (bearer-authorized), terminates TLS
# locally, runs the global/zone/GeoIP WAF, serves the disk cache, and forwards to
# the upstream. Both binaries are Go now. See EDGE.md.
on:
  push:
    paths:
      - '**/*.go'
      - 'go.mod'
      - 'go.sum'
      - 'deploy/edge/e2e/**'
      - '.github/workflows/edge-e2e.yaml'
  pull_request:
    paths:
      - '**/*.go'
      - 'go.mod'
      - 'go.sum'
      - 'deploy/edge/e2e/**'
      - '.github/workflows/edge-e2e.yaml'

jobs:
  e2e:
    name: edge ↔ control-plane e2e
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.5'
          # Self-hosted runner: local GOMODCACHE/GOCACHE beat the remote
          # actions-cache restore (see go-test.yaml for the numbers).
          cache: false
      - name: Install test deps (openssl, curl, python3, nc)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends openssl curl python3 netcat-openbsd ca-certificates
      - run: bash deploy/edge/e2e/run.sh
