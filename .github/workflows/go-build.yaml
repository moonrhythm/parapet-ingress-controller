name: Go Build
on:
  push:
    branches:
    - main
    paths:
    - '**/*.go'
    - 'go.mod'
    - 'go.sum'
    - 'Dockerfile'
    - '.github/workflows/go-build.yaml'
  # PRs do NOT build automatically. To build a PR image (tagged with the head
  # commit SHA) before merge, manually run this workflow from the Actions tab
  # and pick the PR's branch. Same-repo branches only (needs registry creds).
  workflow_dispatch: {}
jobs:
  build:
    runs-on: self-hosted
    name: Build
    steps:
    - uses: actions/checkout@v4
    - uses: google-github-actions/auth@v2
      id: auth
      with:
        credentials_json: ${{ secrets.GOOGLE_CREDENTIALS }}
        token_format: access_token
    - uses: docker/login-action@v3
      with:
        registry: us-docker.pkg.dev
        username: oauth2accesstoken
        password: ${{ steps.auth.outputs.access_token }}
    - uses: docker/login-action@v3
      with:
        registry: asia-southeast3-docker.pkg.dev
        username: oauth2accesstoken
        password: ${{ steps.auth.outputs.access_token }}
    - uses: docker/setup-buildx-action@v3
      with:
        version: latest
        platforms: linux/amd64,linux/arm64
    # Default tags: a multi-arch manifest (linux/amd64 GOAMD64=v3 + linux/arm64).
    # The controller is pure Go (CGO_ENABLED=0), so buildx cross-compiles each
    # arch natively on the runner — no QEMU/binfmt (see the $BUILDPLATFORM build
    # stage in the Dockerfile). GOAMD64 applies to amd64 only; Go ignores it for
    # arm64.
    - uses: docker/build-push-action@v6
      with:
        provenance: false
        context: .
        platforms: linux/amd64,linux/arm64
        build-args: |
          VERSION=${{ github.sha }}
          GOAMD64=v3
        push: true
        tags: |
          us-docker.pkg.dev/moonrhythm-containers/gcr.io/parapet-ingress-controller:${{ github.sha }}
          asia-southeast3-docker.pkg.dev/moonrhythm-core/public/parapet-ingress-controller:${{ github.sha }}
    # Compatibility image: amd64-only, GOAMD64=v1 for older CPUs. No arm64 variant
    # (GOAMD64 microarch levels are an amd64 concept).
    - uses: docker/build-push-action@v6
      with:
        provenance: false
        context: .
        platforms: linux/amd64
        build-args: |
          VERSION=${{ github.sha }}
          GOAMD64=v1
        push: true
        tags: |
          us-docker.pkg.dev/moonrhythm-containers/gcr.io/parapet-ingress-controller:${{ github.sha }}-amd64v1
          asia-southeast3-docker.pkg.dev/moonrhythm-core/public/parapet-ingress-controller:${{ github.sha }}-amd64v1
