name: Rust Build
on:
  push:
    branches:
      - master
    paths:
      - 'rust/**'
      - '.github/workflows/rust-build.yaml'
  workflow_dispatch: {}

jobs:
  build:
    name: Build (rust)
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        id: auth
        with:
          credentials_json: ${{ secrets.GOOGLE_CREDENTIALS }}
          token_format: access_token
      - uses: docker/login-action@v3
        with:
          registry: us-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}
      - uses: docker/login-action@v3
        with:
          registry: asia-southeast3-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}
      - uses: docker/setup-buildx-action@v3
        with:
          version: latest
          platforms: linux/amd64
      # default GOAMD64-equivalent: x86-64-v3
      - uses: docker/build-push-action@v6
        with:
          context: rust
          provenance: false
          build-args: |
            TARGET_CPU=x86-64-v3
          push: true
          cache-from: type=gha,scope=rust-v3
          cache-to: type=gha,mode=max,scope=rust-v3
          tags: |
            us-docker.pkg.dev/moonrhythm-containers/gcr.io/parapet-ingress-controller:rust-${{ github.sha }}
            asia-southeast3-docker.pkg.dev/moonrhythm-core/public/parapet-ingress-controller:rust-${{ github.sha }}
      # compatibility image: x86-64 baseline (Go's GOAMD64=v1 equivalent;
      # LLVM has no "x86-64-v1" — the baseline microarch level is just "x86-64")
      - uses: docker/build-push-action@v6
        with:
          context: rust
          provenance: false
          build-args: |
            TARGET_CPU=x86-64
          push: true
          cache-from: type=gha,scope=rust-v1
          cache-to: type=gha,mode=max,scope=rust-v1
          tags: |
            us-docker.pkg.dev/moonrhythm-containers/gcr.io/parapet-ingress-controller:rust-${{ github.sha }}-amd64v1
            asia-southeast3-docker.pkg.dev/moonrhythm-core/public/parapet-ingress-controller:rust-${{ github.sha }}-amd64v1
