name: edge-build

# Builds the two edge images and publishes them under the SAME
# `parapet-ingress-controller` image name as the controller, distinguished by a
# module prefix on the tag (alongside the controller's `:<sha>` stream):
#   controlplane-<sha>  — the Go control plane (Dockerfile.edge-controlplane)
#   edge-<sha>          — the Go edge proxy    (Dockerfile.edge)
# See EDGE.md. Triggered when the Go module or the edge manifests change.
# Auth/registries mirror go-build.
on:
  push:
    branches:
      - main
    paths:
      - '**/*.go'
      - 'go.mod'
      - 'go.sum'
      - 'Dockerfile.edge'
      - 'Dockerfile.edge-controlplane'
      - 'deploy/edge/**'
      - '.github/workflows/edge-build.yaml'
  # PRs do NOT build automatically. To build a PR image (tagged with the head
  # commit SHA) before merge, manually run this workflow from the Actions tab
  # and pick the PR's branch. Same-repo branches only (needs registry creds).
  workflow_dispatch: {}

jobs:
  controlplane:
    name: Build (edge control plane)
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        id: auth
        with:
          credentials_json: ${{ secrets.GOOGLE_CREDENTIALS }}
          token_format: access_token
      - uses: docker/login-action@v3
        with:
          registry: us-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}
      - uses: docker/login-action@v3
        with:
          registry: asia-southeast3-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}
      - uses: docker/setup-buildx-action@v3
        with:
          version: latest
          platforms: linux/amd64
      - uses: docker/build-push-action@v6
        with:
          provenance: false
          context: .
          file: Dockerfile.edge-controlplane
          push: true
          build-args: |
            VERSION=${{ github.sha }}
            GOAMD64=v3
          tags: |
            us-docker.pkg.dev/moonrhythm-containers/gcr.io/parapet-ingress-controller:controlplane-${{ github.sha }}
            asia-southeast3-docker.pkg.dev/moonrhythm-core/public/parapet-ingress-controller:controlplane-${{ github.sha }}

  edge:
    name: Build (edge proxy)
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        id: auth
        with:
          credentials_json: ${{ secrets.GOOGLE_CREDENTIALS }}
          token_format: access_token
      - uses: docker/login-action@v3
        with:
          registry: us-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}
      - uses: docker/login-action@v3
        with:
          registry: asia-southeast3-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}
      - uses: docker/setup-buildx-action@v3
        with:
          version: latest
          platforms: linux/amd64
      - uses: docker/build-push-action@v6
        with:
          provenance: false
          context: .
          file: Dockerfile.edge
          push: true
          build-args: |
            VERSION=${{ github.sha }}
            GOAMD64=v3
          tags: |
            us-docker.pkg.dev/moonrhythm-containers/gcr.io/parapet-ingress-controller:edge-${{ github.sha }}
            asia-southeast3-docker.pkg.dev/moonrhythm-core/public/parapet-ingress-controller:edge-${{ github.sha }}
