name: edge-build

# Builds the two edge images and publishes them under the SAME
# `parapet-ingress-controller` image name as the controller, distinguished by a
# module prefix on the tag (mirroring the existing `:<sha>` Go / `:rust-<sha>`
# Rust streams):
#   controlplane-<sha>  — the Go control plane (go/Dockerfile.edge-controlplane)
#   edge-<sha>          — the Rust edge proxy   (rust/Dockerfile.edge)
# See EDGE.md. Triggered when either side — or the edge manifests — change.
# Auth/registries mirror go-build / rust-build.
on:
  push:
    branches:
      - main
    paths:
      - 'go/**'
      - 'rust/**'
      - 'deploy/edge/**'
      - '.github/workflows/edge-build.yaml'
  # Also build + push on PRs (tagged with the PR's commit SHA) so a PR image can
  # be deployed/tested before merge. Same-repo PRs only (needs registry creds).
  pull_request:
    paths:
      - 'go/**'
      - 'rust/**'
      - 'deploy/edge/**'
      - '.github/workflows/edge-build.yaml'
  workflow_dispatch: {}

jobs:
  controlplane:
    name: Build (edge control plane)
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        id: auth
        with:
          credentials_json: ${{ secrets.GOOGLE_CREDENTIALS }}
          token_format: access_token
      - uses: docker/login-action@v3
        with:
          registry: us-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}
      - uses: docker/login-action@v3
        with:
          registry: asia-southeast3-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}
      - uses: docker/setup-buildx-action@v3
        with:
          version: latest
          platforms: linux/amd64
      - uses: docker/build-push-action@v6
        with:
          provenance: false
          context: go
          file: go/Dockerfile.edge-controlplane
          push: true
          build-args: |
            VERSION=${{ github.sha }}
            GOAMD64=v3
          tags: |
            us-docker.pkg.dev/moonrhythm-containers/gcr.io/parapet-ingress-controller:controlplane-${{ github.sha }}
            asia-southeast3-docker.pkg.dev/moonrhythm-core/public/parapet-ingress-controller:controlplane-${{ github.sha }}

  edge:
    name: Build (edge proxy)
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        id: auth
        with:
          credentials_json: ${{ secrets.GOOGLE_CREDENTIALS }}
          token_format: access_token
      - uses: docker/login-action@v3
        with:
          registry: us-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}
      - uses: docker/login-action@v3
        with:
          registry: asia-southeast3-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}
      - uses: docker/setup-buildx-action@v3
        with:
          version: latest
          platforms: linux/amd64
      - uses: docker/build-push-action@v6
        with:
          provenance: false
          context: rust
          file: rust/Dockerfile.edge
          push: true
          cache-from: type=gha,scope=edge
          cache-to: type=gha,mode=max,scope=edge
          build-args: |
            TARGET_CPU=x86-64-v3
          tags: |
            us-docker.pkg.dev/moonrhythm-containers/gcr.io/parapet-ingress-controller:edge-${{ github.sha }}
            asia-southeast3-docker.pkg.dev/moonrhythm-core/public/parapet-ingress-controller:edge-${{ github.sha }}
