# Edge proxy (Go, on the parapet framework) — terminates public TLS locally with
# a cert+key fetched from the in-cluster control plane, runs the global + zone WAF
# (early-drop), optionally caches responses on disk, and forwards to parapet. See
# ../../EDGE.md. Image built from Dockerfile.edge.
#
# The edge typically runs OUTSIDE the cluster (closer to clients). This manifest
# is for the case where you run it in a *separate* edge cluster / node pool; adapt
# the env to your environment. The defining requirement is that the edge can reach
# the control-plane Service over a private path (tunnel / VPC peering).
apiVersion: v1
kind: Namespace
metadata:
  name: parapet-edge
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: parapet-edge
  namespace: parapet-edge
  labels:
    app: parapet-edge
spec:
  replicas: 2
  selector:
    matchLabels:
      app: parapet-edge
  template:
    metadata:
      name: parapet-edge
      labels:
        app: parapet-edge
    spec:
      containers:
        - name: parapet-edge
          image: gcr.io/moonrhythm-containers/parapet-ingress-controller:edge-latest
          imagePullPolicy: IfNotPresent
          env:
            - name: EDGE_HTTPS_LISTEN
              value: "0.0.0.0:443"
            # Plaintext HTTP listener. The edge does NOT redirect http→https; it
            # forwards with X-Forwarded-Proto: http so the core's per-ingress
            # redirect-https plugin decides. Set "" to disable.
            - name: EDGE_HTTP_LISTEN
              value: "0.0.0.0:80"
            # The domains THIS edge serves (its shard) — pre-fetched, and the
            # bearer token must be authorized for them. Leave EMPTY to serve ALL
            # domains (certs fetched on demand per SNI; the token's authz still
            # bounds which resolve). See EDGE.md "Pinned vs serve-all".
            - name: EDGE_DOMAINS
              value: "acme.com,www.acme.com"
            # Control-plane endpoint (private path) + the edge's bearer token.
            - name: EDGE_CP_ENDPOINT
              value: "https://edge-controlplane.parapet-ingress-controller.svc:8443"
            - name: EDGE_CP_TOKEN
              valueFrom:
                secretKeyRef:
                  name: parapet-edge-cp
                  key: token
            # Trust the control plane's server cert (internal CA). Optional if the
            # cert chains to a public root.
            - name: EDGE_CP_CA
              value: /cp-ca/ca.crt
            # Where to forward (the in-cluster parapet, reached via the same private
            # path). Plaintext HTTP/1.1 by default; set EDGE_UPSTREAM_TLS=true to
            # re-encrypt across an untrusted hop.
            - name: EDGE_UPSTREAM_ADDR
              value: "parapet-ingress-controller.parapet-ingress-controller.svc:80"
            - name: EDGE_UPSTREAM_TLS
              value: "false"
            # --- Edge auto-trust: present a CP-issued mTLS client cert to the core ---
            # The edge fetches a short-lived data-plane client cert from the control
            # plane (POST /v1/edge-cert, key in memory only) and presents it when it
            # re-encrypts to the core; the core CA-only-trusts it (no TRUST_PROXY edit,
            # no restart). Requires EDGE_UPSTREAM_TLS=true and the upstream pointed at
            # the core's :443. The edge's token entry needs an "id" grant on the CP.
            # See ../../EDGE-AUTOTRUST.md. To enable, set EDGE_UPSTREAM_TLS=true,
            # EDGE_UPSTREAM_ADDR to the core :443, and uncomment:
            # - name: EDGE_DATAPLANE_MTLS
            #   value: "true"
            - name: EDGE_REFRESH_INTERVAL
              value: "300"
            # Run the global + zone WAF at the edge (early-drop; parapet stays
            # authoritative). Fetched from the control plane's GET /v1/waf.
            - name: EDGE_WAF_ENABLED
              value: "true"
            # GeoIP/ASN at the edge (request.country / request.asn) resolve from
            # the TRUE client IP. Same env as the controller; the image bakes both
            # IPLocate DBs at these default paths. Set "" to disable a lookup.
            - name: WAF_GEOIP_DB
              value: /geoip/ip-to-country.mmdb
            - name: WAF_ASN_DB
              value: /geoip/ip-to-asn.mmdb
            # By default the edge is the first hop and distrusts every upstream
            # (overwrites X-Forwarded-* with the true peer). If the edge sits
            # BEHIND another L7 proxy (e.g. Cloudflare), set TRUST_PROXY to honor
            # its X-Forwarded-For so the real client IP flows through to WAF/geo/
            # log. Same spec as the core: true/false/CIDRs (+ cloudflare/google/
            # bunny). Keep the edge reachable only from that front proxy.
            # - name: TRUST_PROXY
            #   value: cloudflare
            # Optional response cache (off by default), from parapet/pkg/cache.
            # honor-origin policy; LRU-bounded. Backend = disk (default;
            # restart-persistent; mount a writable volume at EDGE_CACHE_DIR, see
            # the cache volume below) or memory (bodies in RAM, lost on restart).
            - name: EDGE_CACHE_ENABLED
              value: "false"
            # - name: EDGE_CACHE_BACKEND        # disk (default) | memory
            #   value: "disk"
            - name: EDGE_CACHE_DIR
              value: /var/cache/parapet-edge
            # - name: EDGE_CACHE_MAX_SIZE       # total on-disk bytes (default 1 GiB)
            #   value: "1073741824"
            # - name: EDGE_CACHE_MAX_FILE_SIZE  # per-object bytes (default 8 MiB)
            #   value: "8388608"
            # Cache purge / invalidation (on by default with the cache). The edge
            # polls the control plane's GET /v1/purges and reaps invalidated entries
            # lazily at lookup, plus a background reaper (EDGE_CACHE_PURGE_SWEEP_INTERVAL)
            # that reclaims them proactively. Needs CP_PURGE_ENABLED on the control
            # plane; if the CP isn't distributing purges the edge fail-statics (a 404
            # is a quiet no-op). Disk backend persists the purge cursor under EDGE_CACHE_DIR.
            # - name: EDGE_CACHE_PURGE_ENABLED       # "true" (default) | "false"
            #   value: "true"
            # - name: EDGE_CACHE_PURGE_POLL_INTERVAL # seconds between polls (default 10)
            #   value: "10"
            # - name: EDGE_CACHE_PURGE_MAX_RECORDS   # per-map cap before a conservative fold (default 65536)
            #   value: "65536"
            # - name: EDGE_CACHE_PURGE_SWEEP_INTERVAL # reaper cadence: reclaim invalidated entries off the serving path (default 300s)
            #   value: "300"
            # Prometheus metrics endpoint (connections / bytes / Go runtime). Set
            # "" to disable.
            - name: EDGE_METRICS_LISTEN
              value: ":9187"
            # Metrics push (opt-in): POST the full registry to the control plane's
            # /v1/metrics every N seconds, so an in-cluster Prometheus scrapes the
            # CP's /metrics instead of reaching this out-of-cluster edge. See
            # EDGE.md "Edge metrics push".
            # - name: EDGE_METRICS_PUSH_INTERVAL # seconds; 0 (default) = disabled
            #   value: "60"
            # - name: EDGE_INSTANCE_ID           # per-process discriminator (default: hostname);
            #   value: "edge-a-1"                #   replicas may share one EDGE_ID
          ports:
            - name: https
              containerPort: 443
            - name: http
              containerPort: 80
            - name: metrics
              containerPort: 9187
          # Probes hit /healthz on the plaintext listener; parapet's healthz only
          # answers when the Host is a bare IP (the kubelet probes by pod IP), so
          # it never shadows a real vhost. Readiness flips green after the first
          # cert load, and to 503 during graceful shutdown.
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz?ready=1
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          volumeMounts:
            - name: cp-ca
              mountPath: /cp-ca
              readOnly: true
            # Writable cache dir (only used when EDGE_CACHE_ENABLED=true). emptyDir
            # is fine — the cache is just an optimization and re-warms; swap for a
            # PVC to persist across pod restarts.
            - name: cache
              mountPath: /var/cache/parapet-edge
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
      volumes:
        - name: cp-ca
          secret:
            secretName: parapet-edge-cp-ca # ca.crt the edge uses to verify the control plane
        - name: cache
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: parapet-edge
  namespace: parapet-edge
  labels:
    app: parapet-edge
spec:
  type: LoadBalancer
  externalTrafficPolicy: Local # preserve client source IP (edge is the first hop)
  selector:
    app: parapet-edge
  ports:
    - name: https
      port: 443
      targetPort: https
    - name: http
      port: 80
      targetPort: http
