# Edge proxy (Go, on the parapet framework) — terminates public TLS locally with
# a cert+key fetched from the in-cluster control plane, runs the global + zone WAF
# (early-drop), optionally caches responses on disk, and forwards to parapet. See
# ../../EDGE.md. (Migrated off Rust/Pingora; image is now go/Dockerfile.edge.)
#
# The edge typically runs OUTSIDE the cluster (closer to clients). This manifest
# is for the case where you run it in a *separate* edge cluster / node pool; adapt
# the env to your environment. The defining requirement is that the edge can reach
# the control-plane Service over a private path (tunnel / VPC peering).
apiVersion: v1
kind: Namespace
metadata:
  name: parapet-edge
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: parapet-edge
  namespace: parapet-edge
  labels:
    app: parapet-edge
spec:
  replicas: 2
  selector:
    matchLabels:
      app: parapet-edge
  template:
    metadata:
      name: parapet-edge
      labels:
        app: parapet-edge
    spec:
      containers:
        - name: parapet-edge
          image: gcr.io/moonrhythm-containers/parapet-ingress-controller:edge-latest
          imagePullPolicy: IfNotPresent
          env:
            - name: EDGE_HTTPS_LISTEN
              value: "0.0.0.0:443"
            # Plaintext HTTP listener. The edge does NOT redirect http→https; it
            # forwards with X-Forwarded-Proto: http so the core's per-ingress
            # redirect-https plugin decides. Set "" to disable.
            - name: EDGE_HTTP_LISTEN
              value: "0.0.0.0:80"
            # The domains THIS edge serves (its shard) — pre-fetched, and the
            # bearer token must be authorized for them. Leave EMPTY to serve ALL
            # domains (certs fetched on demand per SNI; the token's authz still
            # bounds which resolve). See EDGE.md "Pinned vs serve-all".
            - name: EDGE_DOMAINS
              value: "acme.com,www.acme.com"
            # Control-plane endpoint (private path) + the edge's bearer token.
            - name: EDGE_CP_ENDPOINT
              value: "https://edge-controlplane.parapet-ingress-controller.svc:8443"
            - name: EDGE_CP_TOKEN
              valueFrom:
                secretKeyRef:
                  name: parapet-edge-cp
                  key: token
            # Trust the control plane's server cert (internal CA). Optional if the
            # cert chains to a public root.
            - name: EDGE_CP_CA
              value: /cp-ca/ca.crt
            # Where to forward (the in-cluster parapet, reached via the same private
            # path). Plaintext HTTP/1.1 by default; set EDGE_UPSTREAM_TLS=true to
            # re-encrypt across an untrusted hop.
            - name: EDGE_UPSTREAM_ADDR
              value: "parapet-ingress-controller.parapet-ingress-controller.svc:80"
            - name: EDGE_UPSTREAM_TLS
              value: "false"
            - name: EDGE_REFRESH_INTERVAL
              value: "300"
            # Run the global + zone WAF at the edge (early-drop; parapet stays
            # authoritative). Fetched from the control plane's GET /v1/waf.
            - name: EDGE_WAF_ENABLED
              value: "true"
            # GeoIP/ASN at the edge (request.country / request.asn) resolve from
            # the TRUE client IP. Same env as the controller; the image bakes both
            # IPLocate DBs at these default paths. Set "" to disable a lookup.
            - name: WAF_GEOIP_DB
              value: /geoip/ip-to-country.mmdb
            - name: WAF_ASN_DB
              value: /geoip/ip-to-asn.mmdb
            # Optional disk-backed response cache (off by default). Enable it and
            # mount a writable volume at EDGE_CACHE_DIR (see the cache volume
            # below). honor-origin policy; LRU-bounded; restart-persistent.
            - name: EDGE_CACHE_ENABLED
              value: "false"
            - name: EDGE_CACHE_DIR
              value: /var/cache/parapet-edge
            # - name: EDGE_CACHE_MAX_SIZE       # total on-disk bytes (default 1 GiB)
            #   value: "1073741824"
            # - name: EDGE_CACHE_MAX_FILE_SIZE  # per-object bytes (default 8 MiB)
            #   value: "8388608"
            # Prometheus metrics endpoint (connections / bytes / Go runtime). Set
            # "" to disable.
            - name: EDGE_METRICS_LISTEN
              value: ":9187"
          ports:
            - name: https
              containerPort: 443
            - name: http
              containerPort: 80
            - name: metrics
              containerPort: 9187
          # Probes hit /healthz on the plaintext listener; parapet's healthz only
          # answers when the Host is a bare IP (the kubelet probes by pod IP), so
          # it never shadows a real vhost. Readiness flips green after the first
          # cert load, and to 503 during graceful shutdown.
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz?ready=1
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          volumeMounts:
            - name: cp-ca
              mountPath: /cp-ca
              readOnly: true
            # Writable cache dir (only used when EDGE_CACHE_ENABLED=true). emptyDir
            # is fine — the cache is just an optimization and re-warms; swap for a
            # PVC to persist across pod restarts.
            - name: cache
              mountPath: /var/cache/parapet-edge
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
      volumes:
        - name: cp-ca
          secret:
            secretName: parapet-edge-cp-ca # ca.crt the edge uses to verify the control plane
        - name: cache
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: parapet-edge
  namespace: parapet-edge
  labels:
    app: parapet-edge
spec:
  type: LoadBalancer
  externalTrafficPolicy: Local # preserve client source IP (edge is the first hop)
  selector:
    app: parapet-edge
  ports:
    - name: https
      port: 443
      targetPort: https
    - name: http
      port: 80
      targetPort: http
