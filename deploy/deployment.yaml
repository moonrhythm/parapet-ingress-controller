apiVersion: apps/v1
kind: Deployment
metadata:
  name: parapet-ingress-controller
  namespace: parapet-ingress-controller
  labels:
    app: parapet-ingress-controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app: parapet-ingress-controller
  template:
    metadata:
      annotations:
        prometheus.io/port: "9187"
        prometheus.io/scrape: "true"
      name: parapet-ingress-controller
      labels:
        app: parapet-ingress-controller
    spec:
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchExpressions:
              - key: app
                operator: In
                values:
                - parapet-ingress-controller
            topologyKey: kubernetes.io/hostname
      serviceAccountName: parapet-ingress-controller
      containers:
      - name: parapet-ingress-controller
        image: registry.moonrhythm.io/parapet-ingress-controller:v0.13.12
        imagePullPolicy: IfNotPresent
        env:
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: TRUST_PROXY
          value: cloudflare
        - name: DISABLE_LOG
          value: "true"
        - name: HOST_CONCURRENT_CAPACITY
          value: "10000"
        - name: HOST_COUNTRY_HEADER
          value: Cf-Ipcountry
        - name: HOST_COUNTRY_CONCURRENT_CAPACITY
          value: "4000"
        - name: PROFILER
          value: "false"
        # --- Edge auto-trust (CA-only mTLS): pull the edge CA from the control plane ---
        # The core then trusts any client cert chaining to that edge CA, in addition
        # to TRUST_PROXY above — so a newly-deployed edge is trusted with no env edit
        # and no restart. EDGE_TRUST_CP_CA is the CP SERVER CA (mandatory, verified;
        # no plaintext, no skip-verify). Mount it (e.g. Secret edge-controlplane-ca)
        # at /cp-trust-ca and uncomment. See EDGE-AUTOTRUST.md.
        # - name: EDGE_TRUST_CP_ENDPOINT
        #   value: https://edge-controlplane.parapet-ingress-controller.svc:8443
        # - name: EDGE_TRUST_CP_CA
        #   value: /cp-trust-ca/ca.crt
        # Opt into the WAF. GeoIP filtering (request.country / request.asn) then works
        # out of the box: the images bake both IPLocate DBs and WAF_GEOIP_DB /
        # WAF_ASN_DB default to them. Set those to "" to disable a lookup, or to a
        # custom path. Uncomment to enable:
        # - name: WAF_ENABLED
        #   value: "true"
        # Opt into ConfigMap-driven rate limiting (global + zone sets, the same
        # label/zone model as the WAF). See RATELIMIT.md. Uncomment to enable:
        # - name: RATELIMIT_ENABLED
        #   value: "true"
        ports:
        - name: http
          containerPort: 80
        - name: https
          containerPort: 443
        livenessProbe:
          failureThreshold: 3
          httpGet:
            path: /healthz
            port: http
            scheme: HTTP
          initialDelaySeconds: 5
          periodSeconds: 10
          successThreshold: 1
          timeoutSeconds: 3
        readinessProbe:
          failureThreshold: 3
          httpGet:
            path: /healthz
            port: http
            scheme: HTTP
          initialDelaySeconds: 5
          periodSeconds: 5
          successThreshold: 1
          timeoutSeconds: 3
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
      terminationGracePeriodSeconds: 60
