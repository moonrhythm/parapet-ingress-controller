apiVersion: apps/v1
kind: Deployment
metadata:
  name: parapet-ingress-controller
  namespace: parapet-ingress-controller
  labels:
    app: parapet-ingress-controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app: parapet-ingress-controller
  template:
    metadata:
      annotations:
        prometheus.io/port: "9187"
        prometheus.io/scrape: "true"
      name: parapet-ingress-controller
      labels:
        app: parapet-ingress-controller
    spec:
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchExpressions:
              - key: app
                operator: In
                values:
                - parapet-ingress-controller
            topologyKey: kubernetes.io/hostname
      serviceAccountName: parapet-ingress-controller
      containers:
      - name: parapet-ingress-controller
        image: registry.moonrhythm.io/parapet-ingress-controller:v0.13.12
        imagePullPolicy: IfNotPresent
        env:
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: TRUST_PROXY
          value: cloudflare
        - name: DISABLE_LOG
          value: "true"
        - name: HOST_CONCURRENT_CAPACITY
          value: "10000"
        - name: HOST_COUNTRY_HEADER
          value: Cf-Ipcountry
        - name: HOST_COUNTRY_CONCURRENT_CAPACITY
          value: "4000"
        - name: PROFILER
          value: "false"
        # Opt into the WAF + GeoIP filtering (request.country / request.asn). The
        # images bake both IPLocate DBs (ip-to-country and ip-to-asn) by default.
        # Uncomment to enable:
        # - name: WAF_ENABLED
        #   value: "true"
        # - name: WAF_GEOIP_DB
        #   value: /geoip/ip-to-country.mmdb
        # - name: WAF_ASN_DB
        #   value: /geoip/ip-to-asn.mmdb
        ports:
        - name: http
          containerPort: 80
        - name: https
          containerPort: 443
        livenessProbe:
          failureThreshold: 3
          httpGet:
            path: /healthz
            port: http
            scheme: HTTP
          initialDelaySeconds: 5
          periodSeconds: 10
          successThreshold: 1
          timeoutSeconds: 3
        readinessProbe:
          failureThreshold: 3
          httpGet:
            path: /healthz
            port: http
            scheme: HTTP
          initialDelaySeconds: 5
          periodSeconds: 5
          successThreshold: 1
          timeoutSeconds: 3
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
      terminationGracePeriodSeconds: 60
